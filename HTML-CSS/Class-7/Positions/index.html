<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <h1>Positions</h1>

    <h2>static</h2>
    <section id="static">
        <div style="background-color: lightcoral;">1</div>
        <div id="middle" style="background-color: lightseagreen;">2</div>
        <div style="background-color: lightskyblue;">3</div>
    </section>

    <h2>relative</h2>
     <section id="relative">
        <div style="background-color: lightgoldenrodyellow;">1</div>
        <div id="middle" style="background-color: lightpink;">2</div>
        <div style="background-color: lightslategrey;">3</div>
    </section>

     <h2>absolute</h2>
     <section id="absolute">
        <div style="background-color: lightcyan;">1</div>
        <div id="middle" style="background-color: lime;">2</div>
        <div style="background-color: lightgray;">3</div>
    </section>
    
</body>
</html>
